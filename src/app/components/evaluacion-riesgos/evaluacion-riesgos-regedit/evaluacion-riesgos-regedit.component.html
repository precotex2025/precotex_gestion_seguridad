<div class="dialog-container">
  
  <div class="dialog-header">
    <h2 class="dialog-title">{{ data.Accion === 'I' ? 'Nuevo registro' : 'Editar registro' }}</h2>
    <button type="button" class="btn-close-header" (click)="onCancelar()" title="Cerrar">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="formulario" (ngSubmit)="onGuardar()">
    
    <mat-dialog-content class="form-content">
      
      <!-- Fila 1: 4 Columnas (CÓDIGO, TIPO, DESCRIPCIÓN, PROCESO) -->
      <div class="grid-4-cols">
        <div class="form-section-item">
          <div class="form-label">CÓDIGO</div>
          <input type="text" formControlName="codigo" class="full-width-input" placeholder="Ej. RSG-2025-043">
        </div>
        <div class="form-section-item">
          <div class="form-label">TIPO</div>
          <select formControlName="tipo" class="full-width-input">
            <option *ngFor="let opt of tiposOptions" [value]="opt">{{ opt }}</option>
          </select>
        </div>
        <div class="form-section-item">
          <div class="form-label">DESCRIPCIÓN</div>
          <input type="text" formControlName="descbrief" class="full-width-input" placeholder="Ej. Falla eléctrica en planta de corte">
        </div>
        <div class="form-section-item">
          <div class="form-label">PROCESO</div>
          <select formControlName="proceso" class="full-width-input">
            <optgroup *ngFor="let key of getProcesosKeys()" [label]="key">
              <option *ngFor="let proc of procesosGroups[key]" [value]="proc">{{ proc }}</option>
            </optgroup>
          </select>
        </div>
      </div>

      <!-- Fila 2: 4 Columnas (NIVEL, ESTADO DE CONTROL, RESPONSABLE, FECHA DE REVISIÓN) -->
      <div class="grid-4-cols">
        <div class="form-section-item">
          <div class="form-label">NIVEL</div>
          <select formControlName="nivel" class="full-width-input">
            <option *ngFor="let opt of nivelesOptions" [value]="opt">{{ opt }}</option>
          </select>
        </div>
        <div class="form-section-item">
          <div class="form-label">ESTADO DE CONTROL</div>
          <select formControlName="estado" class="full-width-input">
            <option *ngFor="let opt of estadosOptions" [value]="opt">{{ opt }}</option>
          </select>
        </div>
        <div class="form-section-item">
          <div class="form-label">RESPONSABLE</div>
          <input type="text" formControlName="responsable" class="full-width-input" placeholder="Nombre del responsable">
        </div>
        <div class="form-section-item">
          <div class="form-label">FECHA DE REVISIÓN</div>
          <input type="date" formControlName="revision" class="full-width-input">
        </div>
      </div>

    </mat-dialog-content>

    <mat-dialog-actions class="dialog-actions-row">
      <button type="button" class="BtnCancelarPlan" mat-flat-button (click)="onCancelar()">
        Cancelar
      </button>
      <button type="submit" class="BtnGuardarPlan" mat-flat-button>
        Guardar
      </button>
    </mat-dialog-actions>
    
  </form>
</div>
