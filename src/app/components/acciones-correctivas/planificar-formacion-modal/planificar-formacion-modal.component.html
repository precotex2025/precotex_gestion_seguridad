<div class="dialog-container">
  
  <mat-toolbar class="banner-header">
    <span class="titulo">{{ data.Title }}</span>
    <span class="flex-spacer"></span>
    <button type="button" class="btn-close-header" (click)="onCancelar()" title="Cerrar">
      <mat-icon>close</mat-icon>
    </button>
  </mat-toolbar>

  <form [formGroup]="formulario" (ngSubmit)="onGuardar()">
    
    <mat-dialog-content class="form-content">
      
      <!-- Fila 1: NC vinculada & Tipo -->
      <div class="grid-2-cols">
        <div class="form-section-item">
          <div class="form-label">NC Vinculada (*):</div>
          <input type="text" formControlName="nc" class="full-width-input" placeholder="Ej. NC-INT-2025-001">
        </div>
        <div class="form-section-item">
          <div class="form-label">Tipo (*):</div>
          <select formControlName="tipo" class="full-width-input">
            <option *ngFor="let t of tiposOptions" [value]="t">{{ t }}</option>
          </select>
        </div>
      </div>

      <!-- Fila 2: Acción Correctiva -->
      <div class="form-section-item">
        <div class="form-label">Acción Correctiva (*):</div>
        <input type="text" formControlName="accion" class="full-width-input" placeholder="Ej. Actualizar procedimiento costura v2.1">
      </div>

      <!-- Fila 3: Proceso & Responsable -->
      <div class="grid-2-cols">
        <div class="form-section-item">
          <div class="form-label">Proceso (*):</div>
          <select formControlName="proceso" class="full-width-input">
            <optgroup *ngFor="let key of getProcesosKeys()" [label]="key">
              <option *ngFor="let proc of procesosGroups[key]" [value]="proc">{{ proc }}</option>
            </optgroup>
          </select>
        </div>
        <div class="form-section-item">
          <div class="form-label">Responsable (*):</div>
          <input type="text" formControlName="responsable" class="full-width-input" placeholder="Ej. Carlos Ríos">
        </div>
      </div>

      <!-- Fila 4: Fecha Inicio & Fecha Límite -->
      <div class="grid-2-cols">
        <div class="form-section-item">
          <div class="form-label">Fecha Inicio (*):</div>
          <input type="date" formControlName="inicio" class="full-width-input">
        </div>
        <div class="form-section-item">
          <div class="form-label">Fecha Límite (*):</div>
          <input type="date" formControlName="limite" class="full-width-input">
        </div>
      </div>

      <!-- Fila 5: Estado & Auditoría Vinculada -->
      <div class="grid-2-cols">
        <div class="form-section-item">
          <div class="form-label">Estado (*):</div>
          <select formControlName="estado" class="full-width-input">
            <option *ngFor="let est of estadosOptions" [value]="est">{{ est }}</option>
          </select>
        </div>
        <div class="form-section-item">
          <div class="form-label">Auditoría Vinculada:</div>
          <select formControlName="codigoAuditoria" class="full-width-input">
            <option value="">-- Sin auditoría --</option>
            <option *ngFor="let aud of auditoriasList" [value]="aud.codigo_Auditoria">
              {{ aud.codigo_Auditoria }} ({{ aud.tipo }} - {{ aud.norma }})
            </option>
          </select>
        </div>
      </div>

      <!-- Fila 6: Descripción de la Acción -->
      <div class="form-section-item">
        <div class="form-label">Descripción de la Acción:</div>
        <textarea formControlName="desc" rows="3" class="full-width-input textarea-desc" placeholder="Describe la acción para eliminar la causa raíz..."></textarea>
      </div>

    </mat-dialog-content>

    <mat-dialog-actions class="dialog-actions-row">
      <button type="submit" class="BtnGuardarPlan" mat-flat-button>
        Guardar Acción
      </button>
      <button type="button" class="BtnCancelarPlan" mat-flat-button (click)="onCancelar()">
        Cancelar
      </button>
    </mat-dialog-actions>
    
  </form>
</div>
