<div class="contenedor">

  <!-- Botón superior -->
  <div class="top-row">
    <button type="button" class="btn-nueva-revision" (click)="onNuevaRevision()">
      <mat-icon>supervised_user_circle</mat-icon>
      Nueva Revisión de Usuarios
      <mat-icon class="external-icon">open_in_new</mat-icon>
    </button>
  </div>

  <!-- Título principal -->
  <h2 class="subtitulo">Últimas verificaciones realizadas</h2>



  <!-- Grid Table -->
  <div class="table-container">
    <table mat-table [dataSource]="dataSource" class="tabla-wrapper">

      <!-- Fecha / Hora -->
      <ng-container matColumnDef="fechaHora">
        <th mat-header-cell *matHeaderCellDef>Fecha / Hora</th>
        <td mat-cell *matCellDef="let row" class="col-tabular">{{ row.fechaHora }}</td>
      </ng-container>

      <!-- Responsable Verificación -->
      <ng-container matColumnDef="responsable">
        <th mat-header-cell *matHeaderCellDef>Responsable Verificación</th>
        <td mat-cell *matCellDef="let row">{{ row.responsable }}</td>
      </ng-container>

      <!-- Usuarios Inactivos -->
      <ng-container matColumnDef="usuariosInactivos">
        <th mat-header-cell *matHeaderCellDef style="text-align: center; width: 180px;">Usuarios Inactivos</th>
        <td mat-cell *matCellDef="let row" style="text-align: center;">
          <span [class]="row.usuariosInactivos > 0 ? 'badge-inactivos-warn' : 'badge-inactivos-ok'">
            {{ row.usuariosInactivos }}
          </span>
        </td>
      </ng-container>

      <!-- Acciones -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef style="text-align: center; width: 100px;">Acciones</th>
        <td mat-cell *matCellDef="let row" style="text-align: center;">
          <button type="button" class="btn-delete" (click)="onEliminar(row)" title="Eliminar Registro">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>

    </table>
  </div>

</div>
