<div class="dialog-container">
  
  <mat-toolbar class="banner-header">
    <span class="titulo">{{ data.Title }}</span>
    <span class="flex-spacer"></span>
    <button type="button" class="btn-close-header" (click)="onClose()" title="Cerrar">
      <mat-icon>close</mat-icon>
    </button>
  </mat-toolbar>

  <form [formGroup]="formulario" (ngSubmit)="onSave()">
    
    <mat-dialog-content class="form-content">
      
      <!-- Objetivo -->
      <div class="form-section-item">
        <div class="form-label">Objetivo (*):</div>
        <input type="text" formControlName="objetivo" class="full-width-input" placeholder="Ej. Reducir accidentes laborales en planta">
      </div>

      <!-- Proceso & Norma -->
      <div class="grid-2-cols">
        <div class="form-section-item">
          <div class="form-label">Proceso (*):</div>
          <select formControlName="proceso" class="full-width-input">
            <optgroup *ngFor="let key of getProcesosKeys()" [label]="key">
              <option *ngFor="let proc of procesosGroups[key]" [value]="proc">{{ proc }}</option>
            </optgroup>
          </select>
        </div>
        <div class="form-section-item">
          <div class="form-label">Norma (*):</div>
          <select formControlName="norma" class="full-width-input">
            <option *ngFor="let opt of normasOptions" [value]="opt">{{ opt }}</option>
          </select>
        </div>
      </div>

      <!-- Indicador & Frecuencia -->
      <div class="grid-2-cols">
        <div class="form-section-item">
          <div class="form-label">Indicador (*):</div>
          <input type="text" formControlName="indicador" class="full-width-input" placeholder="Ej. N° accidentes">
        </div>
        <div class="form-section-item">
          <div class="form-label">Frecuencia (*):</div>
          <select formControlName="frecuencia" class="full-width-input">
            <option *ngFor="let opt of frecuenciasOptions" [value]="opt">{{ opt }}</option>
          </select>
        </div>
      </div>

      <!-- Línea base & Meta -->
      <div class="grid-2-cols">
        <div class="form-section-item">
          <div class="form-label">Línea base:</div>
          <input type="text" formControlName="base" class="full-width-input" placeholder="Ej. 2 en 2024">
        </div>
        <div class="form-section-item">
          <div class="form-label">Meta (*):</div>
          <input type="text" formControlName="meta" class="full-width-input" placeholder="Ej. 0">
        </div>
      </div>

      <!-- Estado -->
      <div class="form-section-item">
        <div class="form-label">Estado (*):</div>
        <select formControlName="estado" class="full-width-input">
          <option *ngFor="let opt of estadosOptions" [value]="opt">{{ opt }}</option>
        </select>
      </div>

      <!-- Cómo se cumplirá -->
      <div class="form-section-item">
        <div class="form-label">Cómo se cumplirá / Estrategia:</div>
        <textarea formControlName="desc" rows="4" class="full-width-input textarea-desc" placeholder="Describe la estrategia o acciones principales..."></textarea>
      </div>

    </mat-dialog-content>

    <mat-dialog-actions class="dialog-actions-row">
      <button type="submit" class="BtnGuardarPlan" mat-flat-button>
        Guardar Objetivo
      </button>
      <button type="button" class="BtnCancelarPlan" mat-flat-button (click)="onClose()">
        Cancelar
      </button>
    </mat-dialog-actions>
    
  </form>
</div>
