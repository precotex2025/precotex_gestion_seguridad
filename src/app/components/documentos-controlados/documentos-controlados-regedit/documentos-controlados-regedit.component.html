<form class="dialog-form" [formGroup]="formulario" (ngSubmit)="onSave()">
  <div class="dialog-header">
    <div class="dialog-icon-container">
      <span class="material-icons">folder_open</span>
    </div>
    <div class="dialog-header-text">
      <h2 class="dialog-title">{{ title }}</h2>
      <p class="dialog-subtitle">Complete los detalles y guarde el registro en el sistema</p>
    </div>
  </div>

  <div class="dialog-content">
    <!-- Fila 1: Nombre del documento (Ancho completo) -->
    <div class="form-row">
      <div class="form-group full-width">
        <label class="form-label">Nombre del documento (*)</label>
        <input type="text" formControlName="nombre" class="form-input" placeholder="Ej. Procedimiento de Gestión de ACR">
      </div>
    </div>

    <!-- Fila 2: Código & Versión -->
    <div class="form-row two-cols">
      <div class="form-group">
        <label class="form-label">Código (*)</label>
        <input type="text" formControlName="codigo" class="form-input" placeholder="Ej. PRO-IMC-OYM-003" [disabled]="action === 'E'">
      </div>
      <div class="form-group">
        <label class="form-label">Versión</label>
        <input type="text" formControlName="version" class="form-input" placeholder="Ej. v2.1">
      </div>
    </div>

    <!-- Fila 3: Tipo & Formato -->
    <div class="form-row two-cols">
      <div class="form-group">
        <label class="form-label">Tipo de Documento</label>
        <select formControlName="tipo" class="form-input">
          <option *ngFor="let t of tipos" [value]="t">{{ t }}</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Formato</label>
        <select formControlName="formato" class="form-input">
          <option *ngFor="let f of formatos" [value]="f">{{ f }}</option>
        </select>
      </div>
    </div>

    <!-- Fila 4: Proceso (Grouped) -->
    <div class="form-row">
      <div class="form-group full-width">
        <label class="form-label">Proceso / Área Responsable</label>
        <select formControlName="proceso" class="form-input">
          <optgroup *ngFor="let macro of getMacroProcesses()" [label]="macro">
            <option *ngFor="let proc of PROCESOS_GROUPS[macro]" [value]="proc">{{ proc }}</option>
          </optgroup>
        </select>
      </div>
    </div>

    <!-- Fila 5: Vigencia & Estado -->
    <div class="form-row two-cols">
      <div class="form-group">
        <label class="form-label">Vigencia (Vencimiento)</label>
        <input type="date" formControlName="vig" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Estado de Control</label>
        <select formControlName="estado" class="form-input">
          <option *ngFor="let est of estados" [value]="est">{{ est }}</option>
        </select>
      </div>
    </div>

    <!-- Fila 6: Archivo (File Picker input) -->
    <div class="form-row">
      <div class="form-group full-width">
        <label class="form-label">Archivo del Documento (*)</label>
        <div class="file-upload-box">
          <label class="btn-file-select">
            <span class="material-icons">attach_file</span> Seleccionar archivo...
            <input type="file" (change)="onFileChange($event)" style="display: none;">
          </label>
          <span class="file-name-label">{{ fileName }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="dialog-actions">
    <button type="button" class="btn-ghost" (click)="onClose()">Cancelar y volver</button>
    <button type="submit" class="btn-primary" [disabled]="formulario.invalid">Guardar registro</button>
  </div>
</form>
