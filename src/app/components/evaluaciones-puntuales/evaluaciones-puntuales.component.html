<app-bread-crumb
  titulo="Evaluaciones Puntuales"
  icon="rate_review"
>
</app-bread-crumb>

<div class="contenedor">
  <div class="form-content">
    
    <!-- Botones superiores de acción -->
    <div class="acciones-row">
      <button type="button" mat-flat-button class="BtnCrear" (click)="onNuevaEvaluacion()">
        <mat-icon>group_add</mat-icon> Nueva Evaluación Puntual
      </button>
      <button type="button" mat-flat-button class="BtnHistorico" (click)="onVerHistorico()">
        <mat-icon>history</mat-icon> 
        {{ mostrarHistorico ? 'Mostrar Todas' : 'Histórico de Evaluaciones' }}
      </button>
    </div>

    <!-- Tabla de resultados -->
    <table mat-table [dataSource]="dataSource" class="tabla-wrapper">
      
      <!-- Ver / Gestionar (Acciones Agrupadas) -->
      <ng-container matColumnDef="ver_gestionar">
        <th mat-header-cell *matHeaderCellDef style="text-align: center; width: 330px;">Ver / Gestionar</th>
        <td mat-cell *matCellDef="let row" style="text-align: center;">
          <div class="action-buttons-cell">
            <!-- Detalle -->
            <button type="button" mat-flat-button class="btn-action-info" (click)="onVerDetalle(row)" title="Ver detalle">
              <mat-icon>visibility</mat-icon> Ver
            </button>
            <!-- Estadísticas -->
            <button type="button" mat-flat-button class="btn-action-stats" (click)="onVerEstadisticas(row)" title="Estadísticas de participación">
              <mat-icon>bar_chart</mat-icon> Métricas
            </button>
            <!-- Añadir Destinatarios (Solo si está abierta) -->
            <button *ngIf="row.estado === 'ABIERTA'" type="button" mat-flat-button class="btn-action-ok" (click)="onAnadirDestinatarios(row)" title="Añadir destinatarios">
              <mat-icon>person_add</mat-icon> Añadir
            </button>
            <!-- Cerrar (Solo si está abierta) -->
            <button *ngIf="row.estado === 'ABIERTA'" type="button" mat-flat-button class="btn-action-cancel" (click)="onCerrarEvaluacion(row)" title="Cerrar evaluación">
              <mat-icon>lock</mat-icon> Cerrar
            </button>
          </div>
        </td>
      </ng-container>

      <!-- Estado -->
      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef style="text-align: center; width: 120px;">Estado</th>
        <td mat-cell *matCellDef="let row" style="text-align: center;">
          <span class="status-badge" [ngClass]="{
            'status-success': row.estado === 'ABIERTA',
            'status-error': row.estado === 'CERRADA'
          }">
            {{ row.estado === 'ABIERTA' ? 'Abierta' : 'Cerrada' }}
          </span>
        </td>
      </ng-container>

      <!-- Denominación de la Evaluación -->
      <ng-container matColumnDef="denominacion">
        <th mat-header-cell *matHeaderCellDef>Denominación de la Evaluación</th>
        <td mat-cell *matCellDef="let row" class="eval-title-cell">{{ row.denominacion }}</td>
      </ng-container>

      <!-- Fecha Alta -->
      <ng-container matColumnDef="fecha_alta">
        <th mat-header-cell *matHeaderCellDef style="width: 140px;">Fecha Alta</th>
        <td mat-cell *matCellDef="let row" class="col-tabular">{{ row.fechaAlta }}</td>
      </ng-container>

      <!-- Fecha Límite -->
      <ng-container matColumnDef="fecha_limite">
        <th mat-header-cell *matHeaderCellDef style="width: 140px;">Fecha Límite</th>
        <td mat-cell *matCellDef="let row" class="col-tabular">{{ row.fechaLimite }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

  </div>
</div>
