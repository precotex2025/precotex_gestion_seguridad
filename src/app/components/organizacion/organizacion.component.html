<app-bread-crumb
  titulo="Estructura de la Organización"
  icon="gavel">
</app-bread-crumb>

<div class="contenedor sn-animate-in">

  <!-- CARD FILTROS -->
  <div class="filtros-card">
    <div class="acciones-container">

      <!-- BUSCADOR MODERNO -->
      <div class="search-wrapper">
        <mat-icon class="search-icon">search</mat-icon>
        <input type="text" 
               (keyup)="aplicarFiltro($event)" 
               placeholder="Buscar organización..." 
               class="search-input">
      </div>

      <!-- BOTONES MODERNOS -->
      <div class="botones">
        <button type="button" class="btn-primary" (click)="onAgregar()">
          <mat-icon>create_new_folder</mat-icon> 
          <span>Agregar</span>
        </button>    

        <button type="button" class="btn-secondary" (click)="onExportar()">
          <mat-icon>download</mat-icon> 
          <span>Exportar</span>
        </button>           
      </div>

    </div>  
  </div>

  <!-- CONTENEDOR DE TABLA PREMIUM -->
  <div class="table-container shadow-premium">
    <table mat-table [dataSource]="dataSource" matSort class="tabla">

      <!-- Código -->
      <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header style="width: 120px;">Código</th>
        <td mat-cell *matCellDef="let row">
          <span class="code-badge">{{ row.codigo_Organizacion }}</span>
        </td>
      </ng-container>

      <!-- Organización -->
      <ng-container matColumnDef="denominacion">
        <th mat-header-cell *matHeaderCellDef mat-sort-header style="min-width: 200px;">Organización</th>
        <td mat-cell *matCellDef="let row" class="norma-cell">{{ row.denominacion }}</td>
      </ng-container>

      <!-- Sedes -->
      <ng-container matColumnDef="sedes">
        <th mat-header-cell *matHeaderCellDef style="width: 100px; text-align: center;">Sedes</th>
        <td mat-cell *matCellDef="let row" style="text-align: center;">
          <button class="action-btn btn-sede" (click)="onSedes(row)" title="Ver sedes">
            <mat-icon>home</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Procesos/Departamentos -->
      <ng-container matColumnDef="procesos">
        <th mat-header-cell *matHeaderCellDef style="width: 220px; text-align: center;">Procesos/Departamentos</th>
        <td mat-cell *matCellDef="let row" style="text-align: center;">
          <button class="action-btn btn-proceso" (click)="onProcesos(row)" title="Ver procesos/departamentos">
            <mat-icon>settings</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Activos -->
      <ng-container matColumnDef="activos">
        <th mat-header-cell *matHeaderCellDef style="width: 100px; text-align: center;">Activos</th>
        <td mat-cell *matCellDef="let row" style="text-align: center;">
          <button class="action-btn btn-activo" title="Ver activos">
            <mat-icon>shoppingmode</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- Estado -->
      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef style="width: 120px;">Estado</th>
        <td mat-cell *matCellDef="let row">
          <span [class]="row.flg_Activo === 'True' ? 'activo' : 'inactivo'">
            {{ row.flg_Activo === "True" ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
      </ng-container>    

      <!-- Acciones -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef style="width: 110px; text-align: center;">Acciones</th>
        <td mat-cell *matCellDef="let e">
          <div class="actions-wrapper">
            <button class="action-btn btn-edit" (click)="onEditar(e)" title="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button class="action-btn btn-delete" (click)="onEliminar(e)" title="Eliminar">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="fila"></tr>

    </table>
  </div>

</div>

<ngx-spinner bdColor="rgba(51, 51, 51, 0.8)" size="default" type="ball-spin">
    <p style="color: white; text-align: center; ">Cargando... </p>
</ngx-spinner>
