<div class="dialog-wrapper">
  
  <header class="dialog-header">
    <mat-icon class="header-icon">business</mat-icon>
    <h2 class="header-title">{{ data.Title.replace('::. ', '').replace(' .::', '') }}</h2>
  </header>

  <form [formGroup]="formulario" #formDirective="ngForm" class="dialog-form">
    <div class="dialog-content">
      
      <!-- Código (solo editable / visible si no es inserción "I") -->
      <div class="row" *ngIf="data?.Accion !== 'I'">
        <label class="form-label">Código de la Organización</label>
        <div class="input-wrapper disabled-field">
          <mat-icon class="input-icon">vpn_key</mat-icon>
          <input type="text" formControlName="ctrol_codigo" readonly class="form-input">
        </div>
      </div>

      <!-- Denominación -->
      <div class="row">
        <label class="form-label">Denominación <span class="required">*</span></label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">business</mat-icon>
          <input type="text" 
                 formControlName="ctrol_denominacion" 
                 placeholder="Ingrese denominación de la organización..." 
                 class="form-input">
        </div>
      </div>

      <!-- Dirección -->
      <div class="row">
        <label class="form-label">Dirección</label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">place</mat-icon>
          <input type="text" 
                 formControlName="ctrol_direccion" 
                 placeholder="Ingrese dirección..." 
                 class="form-input">
        </div>
      </div>

      <!-- Localidad / Provincia -->
      <div class="form-grid">
        
        <!-- Localidad -->
        <div class="row">
          <label class="form-label">Localidad</label>
          <div class="input-wrapper">
            <mat-icon class="input-icon">location_city</mat-icon>
            <input type="text" 
                   formControlName="ctrol_localidad" 
                   placeholder="Ingrese localidad..." 
                   class="form-input">
          </div>
        </div>

        <!-- Provincia -->
        <div class="row">
          <label class="form-label">Provincia</label>
          <div class="input-wrapper">
            <mat-icon class="input-icon">map</mat-icon>
            <input type="text" 
                   formControlName="ctrol_provincia" 
                   placeholder="Ingrese provincia..." 
                   class="form-input">
          </div>
        </div>

      </div>

      <!-- País -->
      <div class="row">
        <label class="form-label">País</label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">public</mat-icon>
          <input type="text" 
                 formControlName="ctrol_pais" 
                 placeholder="Ingrese país..." 
                 class="form-input">
        </div>
      </div>

    </div>

    <!-- Acciones / Botones -->
    <div class="button-row"> 
      <button type="button" class="btn-primary" (click)="onSave()"> 
        <mat-icon>save</mat-icon>
        <span>Grabar</span>
      </button>

      <button type="button" class="btn-secondary" mat-dialog-close (click)="onClose()">
        <mat-icon>close</mat-icon>
        <span>Salir</span>
      </button>
    </div>   
  </form>

</div>
