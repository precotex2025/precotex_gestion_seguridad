<div class="dialog-wrapper">
  
  <header class="dialog-header">
    <mat-icon class="header-icon">business</mat-icon>
    <h2 class="header-title">{{ data.Title.replace('::. ', '').replace(' .::', '') }}</h2>
  </header>

  <form [formGroup]="formulario" #formDirective="ngForm" class="dialog-form">
    <div class="dialog-content">
      
      <!-- Nombre de la Sede -->
      <div class="row">
        <label class="form-label">Nombre de la Sede <span class="required">*</span></label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">store</mat-icon>
          <input type="text" 
                 formControlName="ctrol_nombre" 
                 placeholder="Ej. Huachipa 1" 
                 class="form-input">
        </div>
      </div>

      <!-- Dirección -->
      <div class="row">
        <label class="form-label">Dirección <span class="required">*</span></label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">place</mat-icon>
          <input type="text" 
                 formControlName="ctrol_direccion" 
                 placeholder="Ej. Av. Los Frutales 123, Huachipa" 
                 class="form-input">
        </div>
      </div>

      <!-- Procesos que operan -->
      <div class="row">
        <label class="form-label">Procesos que operan</label>
        <div class="checkbox-scroll-container">
          <div *ngFor="let group of getProcesosKeys()" class="checkbox-group">
            <h4 class="checkbox-group-title">{{ group }}</h4>
            <div class="checkbox-grid">
              <div *ngFor="let proceso of procesosGroups[group]" class="checkbox-item">
                <input type="checkbox" 
                       [id]="proceso" 
                       [checked]="isProcesoSelected(proceso)" 
                       (change)="onProcesoToggle(proceso, $any($event.target).checked)">
                <label [for]="proceso">{{ proceso }}</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Estado / Ubicación (Distrito) -->
      <div class="row">
        <label class="form-label">Sede / Ubicación <span class="required">*</span></label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">map</mat-icon>
          <select formControlName="ctrol_estado" class="form-input select-input">
            <option value="">Seleccione una ubicación...</option>
            <option value="Huachipa">Huachipa</option>
            <option value="Independencia">Independencia</option>
            <option value="Ate">Ate</option>
            <option value="SJL">SJL</option>
          </select>
        </div>
      </div>

    </div>

    <!-- Acciones / Botones -->
    <div class="button-row"> 
      <button type="button" class="btn-primary" (click)="onSave()"> 
        <mat-icon>save</mat-icon>
        <span>Grabar</span>
      </button>

      <button type="button" class="btn-secondary" mat-dialog-close (click)="onClose()">
        <mat-icon>close</mat-icon>
        <span>Salir</span>
      </button>
    </div>   
  </form>

</div>
