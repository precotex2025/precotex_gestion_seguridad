<app-bread-crumb
  titulo="Gestión de Sedes"
  icon="gavel"
  [titulo2]="miOrganizacion"
  >
</app-bread-crumb>

<div class="contenedor">

    <mat-card class="filtros-card">
        <div class="acciones-container">
        
            <!-- BUSCADOR -->
            <mat-form-field appearance="outline" class="buscador">
                <mat-label>Buscar organización</mat-label>
                <input matInput (keyup)="aplicarFiltro($event)" placeholder="Escriba para buscar">
                <mat-icon matSuffix>search</mat-icon>
            </mat-form-field>

            <!-- BOTONES -->
            <div class="botones">

                <button type="button" class="BtnCrear" mat-flat-button (click)="onAgregar()">
                    <mat-icon aria-label="create_new_folder">create_new_folder
                    </mat-icon> Agregar
                </button>    

                <button type="button" class="BtnExportar" mat-flat-button (click)="onExportar()" >
                    <mat-icon aria-label="create_new_folder">download
                    </mat-icon> Exportar
                </button>   
                
                <button type="button" class="BtnAtras" mat-flat-button (click)="onAtras()" >
                    <mat-icon aria-label="create_new_folder">keyboard_double_arrow_left
                    </mat-icon> Atras
                </button>               
                
            </div>

        </div>  
    </mat-card>     
    
    <table mat-table [dataSource]="dataSource" matSort class="tabla-wrapper">
        <!-- Código -->
        <ng-container matColumnDef="codigo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Código</th>
        <td mat-cell *matCellDef="let row">{{row.codigo_Sede}}</td>
        </ng-container>  

        <!-- Acronimo -->
        <ng-container matColumnDef="acronimo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Acrónimo</th>
        <td mat-cell *matCellDef="let row">{{row.acronimo}}</td>
        </ng-container>
        
        <!-- Denominación -->
        <ng-container matColumnDef="denominacion">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Denominación</th>
        <td mat-cell *matCellDef="let row">{{row.denominacion}}</td>     
		</ng-container>
		
        <!-- Organizacion -->
        <ng-container matColumnDef="organizacion">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Empresa</th>
        <td mat-cell *matCellDef="let row">{{row.organizacion}}</td>              
        </ng-container>     
        
        <!-- Estado -->
        <ng-container matColumnDef="estado">
            <th mat-header-cell *matHeaderCellDef>Estado</th>
            <td mat-cell *matCellDef="let row">
            <span [ngClass]="row.flg_Activo === 'True' ? 'activo' : 'inactivo'">
                {{row.flg_Activo === "True" ? 'Activo' : 'Inactivo'}}
            </span>
            </td>
        </ng-container>           

        <!-- Acciones -->
        <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let e">

            <button mat-icon-button color="primary" (click)="onEditar(e)">
                <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button color="warn" (click)="onEliminar(e)">
                <mat-icon>delete</mat-icon>
            </button>

            </td>
        </ng-container>          
         
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>              
    </table>    

</div>

<ngx-spinner bdColor="rgba(51, 51, 51, 0.8)" size="default" type="ball-spin">
    <p style="color: white; text-align: center; ">Cargando... </p>
</ngx-spinner>
