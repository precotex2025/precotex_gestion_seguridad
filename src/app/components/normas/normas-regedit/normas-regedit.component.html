<div class="dialog-wrapper">
  
  <header class="dialog-header">
    <mat-icon class="header-icon">gavel</mat-icon>
    <h2 class="header-title">{{ data.Title.replace('::. ', '').replace(' .::', '') }}</h2>
  </header>

  <form [formGroup]="formulario" #formDirective="ngForm" class="dialog-form">
    <div class="dialog-content">
      
      <!-- Código (solo editable / visible si no es inserción "I") -->
      <div class="row" *ngIf="data?.Accion !== 'I'">
        <label class="form-label">Código de la Norma</label>
        <div class="input-wrapper disabled-field">
          <mat-icon class="input-icon">vpn_key</mat-icon>
          <input type="text" formControlName="ctrol_codigo" readonly class="form-input">
        </div>
      </div>

      <!-- Denominación -->
      <div class="row">
        <label class="form-label">Denominación / Objetivo <span class="required">*</span></label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">description</mat-icon>
          <input type="text" 
                 formControlName="ctrol_denominacion" 
                 placeholder="Ingrese denominación o código de norma..." 
                 class="form-input">
        </div>
      </div>

      <!-- Descripción -->
      <div class="row">
        <label class="form-label">Descripción Detallada</label>
        <div class="input-wrapper textarea-wrapper">
          <mat-icon class="input-icon">chat_bubble_outline</mat-icon>
          <textarea formControlName="ctrol_descripcion" 
                    placeholder="Ingrese una descripción breve..." 
                    class="form-input form-textarea" 
                    rows="3"></textarea>
        </div>
      </div>        

    </div>

    <!-- Acciones / Botones -->
    <div class="button-row"> 
      <button type="button" class="btn-primary" (click)="onSave()"> 
        <mat-icon>save</mat-icon>
        <span>Grabar</span>
      </button>

      <button type="button" class="btn-secondary" mat-dialog-close (click)="onClose()">
        <mat-icon>close</mat-icon>
        <span>Salir</span>
      </button>
    </div>   
  </form>

</div>
