<div class="dialog-wrapper">
  
  <header class="dialog-header">
    <h2 class="header-title">{{ data.Accion === 'I' ? 'Nuevo registro' : 'Editar registro' }}</h2>
  </header>

  <form [formGroup]="formulario" #formDirective="ngForm" class="dialog-form">
    <div class="dialog-content">
      
      <!-- Fila 1: Nombre de la norma -->
      <div class="form-row">
        <div class="form-field full-width">
          <label class="form-label">Nombre de la norma</label>
          <input type="text" 
                 formControlName="ctrol_denominacion" 
                 placeholder="Ej. ISO 27001:2022" 
                 class="form-input">
        </div>
      </div>

      <!-- Fila 2: Categoría y Estado -->
      <div class="form-row split-2">
        <div class="form-field">
          <label class="form-label">Categoría / Ámbito</label>
          <select formControlName="ctrol_categoria" class="form-select">
            <option value="Calidad">Calidad</option>
            <option value="Seguridad y Salud">Seguridad y Salud</option>
            <option value="Medio Ambiente">Medio Ambiente</option>
            <option value="Otros">Otros</option>
          </select>
        </div>

        <div class="form-field">
          <label class="form-label">Estado</label>
          <select formControlName="ctrol_estado" class="form-select">
            <option value="Vigente">Vigente</option>
            <option value="En revisión">En revisión</option>
            <option value="Por vencer">Por vencer</option>
          </select>
        </div>
      </div>

      <!-- Fila 3: Fechas -->
      <div class="form-row split-2">
        <div class="form-field">
          <label class="form-label">Fecha de vencimiento</label>
          <input type="date" 
                 formControlName="ctrol_fechaVencimiento" 
                 class="form-input-date">
        </div>

        <div class="form-field">
          <label class="form-label">Última auditoría</label>
          <input type="date" 
                 formControlName="ctrol_fechaAuditoria" 
                 class="form-input-date">
        </div>
      </div>

      <!-- Fila 4: Descripción Breve -->
      <div class="form-row">
        <div class="form-field full-width">
          <label class="form-label">Descripción breve</label>
          <textarea formControlName="ctrol_descripcion" 
                    placeholder="Qué cubre esta norma para Precotex..." 
                    class="form-textarea" 
                    rows="3"></textarea>
        </div>
      </div>        

    </div>

    <!-- Acciones / Botones -->
    <div class="button-row"> 
      <button type="button" class="btn-cancelar" (click)="onClose()">
        <span>Cancelar</span>
      </button>
      
      <button type="button" class="btn-guardar" (click)="onSave()"> 
        <span>Guardar</span>
      </button>
    </div>   
  </form>

</div>
