<form class="dialog-form" [formGroup]="formulario" (ngSubmit)="onGuardar()">
  <div class="dialog-header">
    <div class="dialog-icon-container">
      <span class="material-icons">trending_up</span>
    </div>
    <div class="dialog-header-text">
      <h2 class="dialog-title">{{ data.Accion === 'I' ? 'Registrar iniciativa' : 'Editar iniciativa' }}</h2>
      <p class="dialog-subtitle">Complete los detalles de la iniciativa de mejora</p>
    </div>
  </div>

  <div class="dialog-content">
    
    <!-- Fila 1: Título (Ancho completo) -->
    <div class="form-row">
      <div class="form-group full-width">
        <label class="form-label">Título (*)</label>
        <input type="text" formControlName="titulo" class="form-input" placeholder="Ej. Reprocesos en costura línea 3">
      </div>
    </div>

    <!-- Fila 2: Proceso & Sede -->
    <div class="form-row two-cols">
      <div class="form-group">
        <label class="form-label">Proceso (*)</label>
        <select formControlName="proceso" class="form-input">
          <optgroup *ngFor="let macro of getProcesosKeys()" [label]="macro">
            <option *ngFor="let proc of procesosGroups[macro]" [value]="proc">{{ proc }}</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Sede (*)</label>
        <select formControlName="sede" class="form-input">
          <option *ngFor="let s of sedes" [value]="s">{{ s }}</option>
        </select>
      </div>
    </div>

    <!-- Fila 3: Herramienta & Proveniente -->
    <div class="form-row two-cols">
      <div class="form-group">
        <label class="form-label">Herramienta (*)</label>
        <select formControlName="herramienta" class="form-input">
          <option *ngFor="let h of herramientas" [value]="h">{{ h }}</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Proveniente de (*)</label>
        <select formControlName="proveniente" class="form-input">
          <option *ngFor="let p of provenientes" [value]="p">{{ p }}</option>
        </select>
      </div>
    </div>

    <!-- Fila 4: Apertura & Límite -->
    <div class="form-row two-cols">
      <div class="form-group">
        <label class="form-label">Apertura (*)</label>
        <input type="date" formControlName="apertura" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Límite (*)</label>
        <input type="date" formControlName="limite" class="form-input">
      </div>
    </div>

    <!-- Fila 5: Estado -->
    <div class="form-row two-cols">
      <div class="form-group">
        <label class="form-label">Estado (*)</label>
        <select formControlName="estado" class="form-input">
          <option *ngFor="let est of estados" [value]="est">{{ est }}</option>
        </select>
      </div>
      <div class="form-group"></div>
    </div>

  </div>

  <div class="dialog-actions">
    <button type="button" class="btn-ghost" (click)="onCancelar()">Cancelar</button>
    <button type="submit" class="btn-primary" [disabled]="formulario.invalid">Guardar registro</button>
  </div>
</form>
