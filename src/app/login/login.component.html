<div class="login-wrapper">
  
  <!-- LEFT SIDE: FORM PANEL -->
  <div class="login-left-panel">
    <div class="login-card sn-animate-in">
      
      <h2 class="login-title">Iniciar sesión en su cuenta</h2>
      
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="login-form">
        
        <!-- Usuario -->
        <div class="input-group">
          <label class="input-label">Usuario</label>
          <div class="input-wrapper">
            <input type="text" formControlName="user" placeholder="Escriba su usuario" class="form-input">
            <button type="button" class="clear-btn" *ngIf="loginForm.get('user')?.value" (click)="loginForm.get('user')?.setValue('')">
              <mat-icon>close</mat-icon>
            </button>
          </div>
        </div>

        <!-- Contraseña -->
        <div class="input-group">
          <label class="input-label">Contraseña</label>
          <div class="input-wrapper">
            <input [type]="ocultarPassword ? 'password' : 'text'" 
                   formControlName="pass" 
                   placeholder="••••••••" 
                   class="form-input">
            <button type="button" class="toggle-password-btn" (click)="ocultarPassword = !ocultarPassword">
              <mat-icon class="toggle-icon">
                {{ ocultarPassword ? 'visibility_off' : 'visibility' }}
              </mat-icon>
            </button>
          </div>
        </div>

        <!-- Opciones Checkbox & Link -->
        <div class="login-options">
          <label class="custom-checkbox">
            <input type="checkbox" formControlName="recordarme">
            <span>Recordarme</span>
          </label>
          <a href="javascript:void(0)" class="forgot-link">¿Olvidó su contraseña?</a>
        </div>

        <!-- Botón Ingresar -->
        <button type="submit" class="btn-login-submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Ingresando...' : 'Ingresar' }}
        </button>

      </form>
    </div>
  </div>

  <!-- RIGHT SIDE: COLORFUL MESH PANEL -->
  <div class="login-right-panel">
    <div class="circles-overlay">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="svg-circles">
        <circle cx="100" cy="0" r="30" stroke="rgba(255,255,255,0.12)" stroke-width="0.3"/>
        <circle cx="100" cy="0" r="40" stroke="rgba(255,255,255,0.12)" stroke-width="0.3"/>
        <circle cx="100" cy="0" r="50" stroke="rgba(255,255,255,0.12)" stroke-width="0.3"/>
        <circle cx="100" cy="0" r="60" stroke="rgba(255,255,255,0.12)" stroke-width="0.3"/>
        <circle cx="100" cy="0" r="70" stroke="rgba(255,255,255,0.12)" stroke-width="0.3"/>
        <circle cx="100" cy="0" r="80" stroke="rgba(255,255,255,0.12)" stroke-width="0.3"/>
        <circle cx="100" cy="0" r="90" stroke="rgba(255,255,255,0.12)" stroke-width="0.3"/>
      </svg>
    </div>
    
    <div class="mesh-logo-container">
      <div class="mesh-shield">
        <mat-icon>verified_user</mat-icon>
      </div>
      <h1 class="mesh-title">Smul</h1>
      <p class="mesh-subtitle">Portal Corporativo de Gestión Documentaria</p>
    </div>

    <!-- Dots pattern -->
    <div class="dots-pattern"></div>
  </div>

</div>
